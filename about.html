<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Us</title>
  <link rel="stylesheet" href="styles.css" />

</head>

<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contacts.html">Contact</a>
  </nav>

  <!-- About Section -->
  <section>
    <h1>About Us</h1>
    <p>
      We are a digital solutions company helping businesses grow through
      technology, design, and marketing strategies.
    </p>

    <p>
      Our mission is to deliver high-quality web solutions that create real impact.
    </p>
  </section>

  <!-- 🔥 CONSENT BANNER -->
  <div id="consent-banner" style="
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #222;
  color: #fff;
  padding: 15px;
  text-align: center;
  z-index: 9999;
  ">
    <p>We use cookies to improve your experience.</p>
    <button onclick="acceptConsent()">Accept</button>
    <button onclick="rejectConsent()">Reject</button>
  </div>

  <!-- 🔥 BASIC CONSENT SCRIPT -->
  <script>
    function loadGTM() {
      (function(w,d,s,l,i){
        w[l]=w[l]||[];
        w[l].push({'gtm.start': new Date().getTime(),event:'gtm.js'});
        var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';
        j.async=true;
        j.src='https://www.googletagmanager.com/gtm.js?id=GTM-K43SXSNN'+dl;
        f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-K43SXSNN');
    }

    function acceptConsent() {
      localStorage.setItem("consent", "accepted");
      loadGTM();
      document.getElementById("consent-banner").style.display = "none";
    }

    function rejectConsent() {
      localStorage.setItem("consent", "rejected");
      document.getElementById("consent-banner").style.display = "none";
    }

    window.onload = function () {
      const consent = localStorage.getItem("consent");

      if (consent === "accepted") {
        loadGTM();
        document.getElementById("consent-banner").style.display = "none";
      } 
      else if (consent === "rejected") {
        document.getElementById("consent-banner").style.display = "none";
      }
    };
  </script>

</body>
</html>
